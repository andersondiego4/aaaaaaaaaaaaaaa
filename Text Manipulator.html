                { id: 'case-camel', name: 'Convert to camelCase', icon: 'fa-text-height', category: 'Case', action: toCamelCase },
                { id: 'case-pascal', name: 'Convert to PascalCase', icon: 'fa-text-height', category: 'Case', action: toPascalCase },
                { id: 'case-snake', name: 'Convert to snake_case', icon: 'fa-text-height', category: 'Case', action: toSnakeCase },
                { id: 'case-kebab', name: 'Convert to kebab-case', icon: 'fa-text-height', category: 'Case', action: toKebabCase },
                { id: 'case-constant', name: 'Convert to CONSTANT_CASE', icon: 'fa-text-height', category: 'Case', action: toConstantCase },
                { id: 'case-slug', name: 'Convert to URL slug', icon: 'fa-link', category: 'Case', action: toSlug },
                { id: 'case-alt', name: 'Convert to aLtErNaTiNg case', icon: 'fa-text-height', category: 'Case', action: toAlternatingCase },
                // Lines
                { id: 'lines-dup', name: 'Remove Duplicate Lines', icon: 'fa-copy', category: 'Lines', action: removeDuplicateLines },
                { id: 'lines-empty', name: 'Remove Empty Lines', icon: 'fa-minus', category: 'Lines', action: removeEmptyLines },
                { id: 'lines-num', name: 'Add Line Numbers', icon: 'fa-list-ol', category: 'Lines', action: addLineNumbers },
                { id: 'lines-rmnum', name: 'Remove Line Numbers', icon: 'fa-list', category: 'Lines', action: removeLineNumbers },
                { id: 'lines-sort', name: 'Sort Lines A→Z', icon: 'fa-sort-alpha-down', category: 'Lines', action: sortLinesAlphabetically },
                { id: 'lines-sort-rev', name: 'Sort Lines Z→A', icon: 'fa-sort-alpha-up', category: 'Lines', action: sortLinesReverse },
                { id: 'lines-sort-len', name: 'Sort Lines by Length', icon: 'fa-arrow-down-short-wide', category: 'Lines', action: sortLinesByLength },
                { id: 'lines-shuffle', name: 'Shuffle Lines', icon: 'fa-shuffle', category: 'Lines', action: shuffleLines },
                { id: 'lines-reverse', name: 'Reverse Lines', icon: 'fa-arrows-up-down', category: 'Lines', action: reverseLines },
                // Encoding
                { id: 'enc-b64', name: 'Encode Base64', icon: 'fa-lock', category: 'Encoding', action: encodeBase64 },
                { id: 'enc-b64d', name: 'Decode Base64', icon: 'fa-unlock', category: 'Encoding', action: decodeBase64 },
                { id: 'enc-url', name: 'URL Encode', icon: 'fa-link', category: 'Encoding', action: urlEncode },
                { id: 'enc-urld', name: 'URL Decode', icon: 'fa-unlink', category: 'Encoding', action: urlDecode },
                { id: 'enc-bin', name: 'Text → Binary', icon: 'fa-1', category: 'Encoding', action: textToBinary },
                { id: 'enc-bind', name: 'Binary → Text', icon: 'fa-font', category: 'Encoding', action: binaryToText },
                { id: 'enc-hex', name: 'Text → Hex', icon: 'fa-h', category: 'Encoding', action: textToHex },
                { id: 'enc-hexd', name: 'Hex → Text', icon: 'fa-font', category: 'Encoding', action: hexToText },
                { id: 'enc-rot13', name: 'ROT13 Cipher', icon: 'fa-arrows-rotate', category: 'Encoding', action: rot13 },
                { id: 'enc-morse', name: 'Text → Morse Code', icon: 'fa-tower-broadcast', category: 'Encoding', action: textToMorse },
                { id: 'enc-morsed', name: 'Morse → Text', icon: 'fa-tower-broadcast', category: 'Encoding', action: morseToText },
                { id: 'enc-html-ent', name: 'Encode HTML Entities', icon: 'fa-code', category: 'Encoding', action: textToHtmlEntities },
                { id: 'enc-html-entd', name: 'Decode HTML Entities', icon: 'fa-code', category: 'Encoding', action: decodeHtmlEntities },
                // Hash
                { id: 'hash-sha1', name: 'Generate SHA-1 Hash', icon: 'fa-fingerprint', category: 'Hash', action: () => generateHash('SHA-1') },
                { id: 'hash-sha256', name: 'Generate SHA-256 Hash', icon: 'fa-fingerprint', category: 'Hash', action: () => generateHash('SHA-256') },
                { id: 'hash-sha384', name: 'Generate SHA-384 Hash', icon: 'fa-fingerprint', category: 'Hash', action: () => generateHash('SHA-384') },
                { id: 'hash-sha512', name: 'Generate SHA-512 Hash', icon: 'fa-fingerprint', category: 'Hash', action: () => generateHash('SHA-512') },
                // JSON
                { id: 'json-pretty', name: 'Prettify JSON', icon: 'fa-indent', category: 'JSON', action: prettifyJson },
                { id: 'json-min', name: 'Minify JSON', icon: 'fa-compress', category: 'JSON', action: minifyJson },
                { id: 'json-validate', name: 'Validate JSON', icon: 'fa-circle-check', category: 'JSON', action: () => validateDocument('json') },
                // Emoji
                { id: 'emo-w2e', name: 'Words → Emojis', icon: 'fa-face-smile', category: 'Emoji', action: convertWordsToEmojis },
                { id: 'emo-e2w', name: 'Emojis → Words', icon: 'fa-font', category: 'Emoji', action: convertEmojisToWords },
                { id: 'emo-rand', name: 'Add Random Emojis', icon: 'fa-sparkles', category: 'Emoji', action: addRandomEmojis },
                { id: 'emo-clean', name: 'Remove All Emojis', icon: 'fa-broom', category: 'Emoji', action: removeAllEmojis },
                // Export
                { id: 'exp-txt', name: 'Save as TXT', icon: 'fa-file-lines', category: 'Export', shortcut: 'Ctrl+S', action: saveAsTxt },
                { id: 'exp-pdf', name: 'Save as PDF', icon: 'fa-file-pdf', category: 'Export', action: saveAsPdf },
                { id: 'exp-md', name: 'Save as Markdown', icon: 'fa-markdown', category: 'Export', action: saveAsMarkdown },
                { id: 'exp-html', name: 'Save as HTML', icon: 'fa-html5', category: 'Export', action: saveAsHtml },
                { id: 'exp-json', name: 'Save as JSON', icon: 'fa-code', category: 'Export', action: saveAsJson },
                { id: 'exp-xml', name: 'Save as XML', icon: 'fa-code', category: 'Export', action: saveAsXml },
                { id: 'exp-csv', name: 'Save as CSV', icon: 'fa-table', category: 'Export', action: saveAsCsv },
                { id: 'exp-rtf', name: 'Save as RTF', icon: 'fa-file-word', category: 'Export', action: saveAsRtf },
                { id: 'exp-print', name: 'Print', icon: 'fa-print', category: 'Export', action: printText },
                // View
                { id: 'view-dark', name: darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode', icon: darkMode ? 'fa-sun' : 'fa-moon', category: 'View', action: () => setDarkMode(d => !d) },
                { id: 'view-fs', name: isFullscreen ? 'Exit Focus Mode' : 'Enter Focus Mode', icon: isFullscreen ? 'fa-compress' : 'fa-expand', category: 'View', shortcut: 'F11', action: () => setIsFullscreen(p => !p) },
                { id: 'view-sidebar', name: sidebarCollapsed ? 'Expand Sidebar' : 'Collapse Sidebar', icon: 'fa-bars', category: 'View', action: () => setSidebarCollapsed(p => !p) },
                { id: 'view-wordwrap', name: wordWrap ? 'Disable Word Wrap' : 'Enable Word Wrap', icon: 'fa-text-width', category: 'View', action: () => setWordWrap(w => !w) },
                // Templates
                { id: 'tpl-letter', name: 'Insert Letter Template', icon: 'fa-envelope', category: 'Template', action: () => generateTemplate('letter') },
                { id: 'tpl-memo', name: 'Insert Memo Template', icon: 'fa-note-sticky', category: 'Template', action: () => generateTemplate('memo') },
                { id: 'tpl-report', name: 'Insert Report Template', icon: 'fa-chart-line', category: 'Template', action: () => generateTemplate('report') },
                { id: 'tpl-article', name: 'Insert Article Template', icon: 'fa-newspaper', category: 'Template', action: () => generateTemplate('article') },
                { id: 'tpl-email', name: 'Insert Email Template', icon: 'fa-at', category: 'Template', action: () => generateTemplate('email') },
                { id: 'tpl-lorem', name: 'Generate Lorem Ipsum', icon: 'fa-paragraph', category: 'Template', action: () => generateLoremIpsum(loremParagraphs, loremWordsPerParagraph) },
            ], [activeTab, tabs, darkMode, isFullscreen, sidebarCollapsed, wordWrap, currentTab, loremParagraphs, loremWordsPerParagraph]);

            return (
                <div className="app-shell">
                    {/* Top bar */}
                    <header className="topbar" style={{ padding: '8px 16px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
                            <button className="icon-btn mobile-menu-toggle" onClick={() => setMobileMenuOpen(true)} title="Menu">
                                <i className="fas fa-bars"></i>
                            </button>
                            <div className="brand">
                                <div className="brand-logo"><i className="fas fa-feather-pointed"></i></div>
                                <div className="brand-text">
                                    <div style={{ lineHeight: 1.1 }}>Text Manipulator</div>
                                    <div style={{ fontSize: 10, fontWeight: 500, color: 'var(--text-mute)', letterSpacing: '0.04em', textTransform: 'uppercase' }}>Pro Edition</div>
                                </div>
                            </div>

                            <div style={{ flex: 1 }}></div>

                            {!isFullscreen && (
                                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                                    <span className="stat-pill c"><span className="num">{characterCount}</span><span>chars</span></span>
                                    <span className="stat-pill w"><span className="num">{wordCount}</span><span>words</span></span>
                                    <span className="stat-pill l"><span className="num">{lineCount}</span><span>lines</span></span>
                                    <span className="stat-pill p"><span className="num">{paragraphCount}</span><span>paras</span></span>
                                </div>
                            )}

                            <div style={{ width: 1, height: 24, background: 'var(--border)', margin: '0 4px' }}></div>

                            <button onClick={() => setPaletteOpen(true)} className="icon-btn" title="Command palette (Ctrl+K)">
                                <i className="fas fa-bolt"></i>
                            </button>
                            <button onClick={() => setFindOpen(true)} className="icon-btn" title="Find & Replace (Ctrl+F)">
                                <i className="fas fa-magnifying-glass"></i>
                            </button>
                            <button onClick={undo} className="icon-btn" title="Undo (Ctrl+Z)">
                                <i className="fas fa-rotate-left"></i>
                            </button>
                            <button onClick={redo} className="icon-btn" title="Redo (Ctrl+Y)">
                                <i className="fas fa-rotate-right"></i>
                            </button>
                            <button onClick={() => setIsFullscreen(!isFullscreen)} className="icon-btn"
                                title={isFullscreen ? 'Exit focus mode (F11)' : 'Focus mode (F11)'}>
                                <i className={`fas ${isFullscreen ? 'fa-compress' : 'fa-expand'}`}></i>
                            </button>
                            <button onClick={() => { setWordWrap(w => !w); showToast(wordWrap ? 'Word wrap off' : 'Word wrap on', 'info'); }} className={`icon-btn ${wordWrap ? '' : 'primary'}`}
                                title={wordWrap ? 'Word wrap: ON (click to disable)' : 'Word wrap: OFF (click to enable)'}>
                                <i className="fas fa-text-width"></i>
                            </button>
                            <button onClick={() => setDarkMode(!darkMode)} className="icon-btn primary"
                                title={darkMode ? 'Switch to light' : 'Switch to dark'}>
                                <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                            </button>
                        </div>
                    </header>

                    <div style={{ display: 'flex', flex: 1, minHeight: 0 }}>
                        {/* Sidebar */}
                        {!isFullscreen && (
                            <Sidebar
                                activeCategory={activeCategory}
                                setActiveCategory={setActiveCategory}
                                categories={categories}
                                isCollapsed={sidebarCollapsed}
                                setIsCollapsed={setSidebarCollapsed}
                                mobileOpen={mobileMenuOpen}
                                closeMobile={() => setMobileMenuOpen(false)}
                            />
                        )}

                        {/* Main */}
                        <main style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
                            {!isFullscreen && (
                                <TabBar
                                    tabs={tabs}
                                    activeTab={activeTab}
                                    setActiveTab={setActiveTab}
                                    onNewTab={addNewTab}
                                    onCloseTab={closeTab}
                                    onRenameTab={renameTab}
                                />
                            )}

                            <div style={{ flex: 1, padding: isFullscreen ? '8px' : '16px', display: 'flex', flexDirection: 'column', gap: isFullscreen ? 8 : 16, overflowY: 'auto' }}>
                                {/* Editor */}
                                <div className={`editor-shell ${isFullscreen ? 'fullscreen-editor' : ''} ${shouldCollapse ? 'editor-collapsed' : ''}`}
                                     style={{ flex: isFullscreen ? 1 : 'none', display: 'flex', flexDirection: 'column' }}>
                                    <div style={{ position: 'relative', flex: isFullscreen ? 1 : 'none' }}>
                                        <div id="quill-editor" style={{ height: isFullscreen ? '100%' : 'auto' }}></div>
                                        {isLongText && editorExpanded && !isFullscreen && (
                                            <div className="editor-scroll-nav">
                                                <button className="editor-scroll-btn" title="Scroll to top" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                                    <i className="fas fa-arrow-up"></i>
                                                </button>
                                                <button className="editor-scroll-btn" title="Scroll to bottom" onClick={() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })}>
                                                    <i className="fas fa-arrow-down"></i>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                    {isLongText && !isFullscreen && (
                                        <button onClick={() => setEditorExpanded(!editorExpanded)} className={`editor-toggle-btn ${editorExpanded ? 'expanded' : ''}`}>
                                            <i className="fas fa-chevron-down"></i>
                                            <span>{editorExpanded ? 'Collapse editor' : 'Expand editor'}</span>
                                            <span className="editor-line-badge">
                                                <i className="fas fa-align-left"></i>
                                                {lineCount} lines
                                            </span>
                                        </button>
                                    )}
                                </div>

                                {/* Function panel */}
                                {!isFullscreen && (
                                    <div className="card tab-content" key={activeCategory} style={{ padding: '18px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, paddingBottom: 14, borderBottom: '1px solid var(--border)' }}>
                                            <div style={{ width: 38, height: 38, borderRadius: 11, background: 'linear-gradient(135deg, rgba(59,130,246,0.15), rgba(129,140,248,0.1))', color: '#3b82f6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15 }}>
                                                <i className={activeCategoryObj?.icon}></i>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.01em' }}>{activeCategoryObj?.name}</div>
                                                <div style={{ fontSize: 11.5, color: 'var(--text-mute)', marginTop: 1 }}>
                                                    {{
                                                        formatting: 'Format and transform your text',
                                                        caseconv: 'Programming-style case conversions',
                                                        lines: 'Operate on lines and structure',
                                                        wordsymbol: 'Wrap words with custom patterns',
                                                        lettersymbol: 'Insert symbols between letters',
                                                        encoding: 'Encode and decode formats',
                                                        hash: 'Cryptographic hashes and JSON tools',
                                                        documents: 'Import, convert and validate documents',
                                                        utilities: 'Generators, emojis and helpers',
                                                        stats: 'Live text analysis and metrics',
                                                        export: 'Save your work in any format'
                                                    }[activeCategory]}
                                                </div>
                                            </div>
                                        </div>
                                        {renderFunctionButtons()}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* Status bar */}
                    <div className="status-bar">
                        <span className="sb-item" title="Current line and column">
                            <i className="fas fa-location-crosshairs"></i>
                            Ln {cursorPos.line}, Col {cursorPos.col}
                        </span>
                        {cursorPos.selLen > 0 && (
                            <>
                                <span className="sb-divider"></span>
                                <span className="sb-item" title="Selection length">
                                    <i className="fas fa-i-cursor"></i>
                                    {cursorPos.selLen} selected
                                </span>
                            </>
                        )}
                        <span className="sb-divider"></span>
                        <span className="sb-item" title="Words"><i className="fas fa-font"></i>{wordCount} words</span>
                        <span className="sb-divider"></span>
                        <span className="sb-item" title="Estimated reading time"><i className="fas fa-book-open"></i>{stats.readingMin} min read</span>
                        <span className="sb-spacer"></span>
                        <span className="sb-item" title="Active tab">
                            <i className="fas fa-file-lines"></i>
                            {currentTab?.name}
                        </span>
                        <span className="sb-divider"></span>
                        <span className="sb-item" title="Press Ctrl+K for command palette">
                            <kbd>Ctrl</kbd>+<kbd>K</kbd>
                        </span>
                    </div>

                    <LoadingSpinner isLoading={isLoading} message={loadingMessage} />

                    <FindReplaceModal
                        isOpen={findOpen}
                        onClose={() => setFindOpen(false)}
                        getText={() => quillInstance ? quillInstance.getText() : text}
                        setTextFn={(t) => setText(t)}
                        showToast={showToast}
                    />

                    <CommandPalette
                        isOpen={paletteOpen}
                        onClose={() => setPaletteOpen(false)}
                        commands={commands}
                    />

                    <div style={{ position: 'fixed', top: 70, right: 16, zIndex: 100, display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {toasts.map(t => (
                            <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)} />
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
