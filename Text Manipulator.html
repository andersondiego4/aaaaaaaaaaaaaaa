                            <div style={{ flex: 1, padding: isFullscreen ? '8px' : '16px', display: 'flex', flexDirection: 'column', gap: isFullscreen ? 8 : 16, overflowY: 'auto' }}>
                                {/* Editor */}
                                <div className={`editor-shell ${isFullscreen ? 'fullscreen-editor' : ''} ${shouldCollapse ? 'editor-collapsed' : ''}`}
                                     style={{ flex: isFullscreen ? 1 : 'none', display: 'flex', flexDirection: 'column' }}>
                                    <div style={{ position: 'relative', flex: isFullscreen ? 1 : 'none' }}>
                                        <div id="quill-editor" style={{ height: isFullscreen ? '100%' : 'auto' }}></div>
                                        {isLongText && editorExpanded && !isFullscreen && (
                                            <div className="editor-scroll-nav">
                                                <button className="editor-scroll-btn" title="Scroll to top" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                                                    <i className="fas fa-arrow-up"></i>
                                                </button>
                                                <button className="editor-scroll-btn" title="Scroll to bottom" onClick={() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' })}>
                                                    <i className="fas fa-arrow-down"></i>
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                    {isLongText && !isFullscreen && (
                                        <button onClick={() => setEditorExpanded(!editorExpanded)} className={`editor-toggle-btn ${editorExpanded ? 'expanded' : ''}`}>
                                            <i className="fas fa-chevron-down"></i>
                                            <span>{editorExpanded ? 'Collapse editor' : 'Expand editor'}</span>
                                            <span className="editor-line-badge">
                                                <i className="fas fa-align-left"></i>
                                                {lineCount} lines
                                            </span>
                                        </button>
                                    )}
                                </div>

                                {/* Function panel */}
                                {!isFullscreen && (
                                    <div className="card tab-content" key={activeCategory} role="region" aria-labelledby="active-category-title" style={{ padding: '18px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, paddingBottom: 14, borderBottom: '1px solid var(--border)' }}>
                                            <div style={{ width: 38, height: 38, borderRadius: 11, background: 'linear-gradient(135deg, rgba(59,130,246,0.15), rgba(129,140,248,0.1))', color: '#3b82f6', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15 }}>
                                                <i className={activeCategoryObj?.icon}></i>
                                            </div>
                                            <div>
                                                <div id="active-category-title" style={{ fontSize: 15, fontWeight: 700, letterSpacing: '-0.01em' }}>{activeCategoryObj?.name}</div>
                                                <div style={{ fontSize: 11.5, color: 'var(--text-mute)', marginTop: 1 }}>
                                                    {{
                                                        formatting: 'Format and transform your text',
                                                        caseconv: 'Programming-style case conversions',
                                                        lines: 'Operate on lines and structure',
                                                        transform: 'Creative & stylized text transformations',
                                                        wordsymbol: 'Wrap words with custom patterns',
                                                        lettersymbol: 'Insert symbols between letters',
                                                        encoding: 'Encode and decode formats',
                                                        hash: 'Cryptographic hashes and JSON tools',
                                                        generators: 'Passwords, UUIDs, timestamps & more',
                                                        regex: 'Live-test regex patterns with replacement',
                                                        diff: 'Compare two tabs line-by-line',
                                                        documents: 'Import, convert and validate documents',
                                                        utilities: 'Emojis, lorem ipsum and helpers',
                                                        stats: 'Live text analysis and metrics',
                                                        export: 'Save your work in any format',
                                                        settings: 'Customize editor and behaviour'
                                                    }[activeCategory] || 'Tools & utilities'}
                                                </div>
                                            </div>
                                        </div>
                                        {renderFunctionButtons()}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* Status bar */}
                    <div className="status-bar">
                        <span className="sb-item" title="Current line and column">
                            <i className="fas fa-location-crosshairs"></i>
                            Ln {cursorPos.line}, Col {cursorPos.col}
                        </span>
                        {cursorPos.selLen > 0 && (
                            <>
                                <span className="sb-divider"></span>
                                <span className="sb-item" title="Selection length">
                                    <i className="fas fa-i-cursor"></i>
                                    {cursorPos.selLen} selected
                                </span>
                            </>
                        )}
                        <span className="sb-divider"></span>
                        <span className="sb-item" title="Words"><i className="fas fa-font"></i>{wordCount} words</span>
                        <span className="sb-divider sb-hide-sm"></span>
                        <span className="sb-item sb-hide-sm" title="Estimated reading time"><i className="fas fa-book-open"></i>{stats.readingMin} min read</span>
                        <span className="sb-spacer"></span>
                        {autoSaveEnabled && lastSavedAt && (
                            <>
                                <span className="sb-item sb-hide-xs" title={`Last auto-saved at ${lastSavedAt.toLocaleTimeString()}`} style={{ color: '#10b981' }}>
                                    <i className="fas fa-cloud-arrow-up"></i>
                                    Saved {lastSavedAt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                </span>
                                <span className="sb-divider sb-hide-xs"></span>
                            </>
                        )}
                        {!autoSaveEnabled && (
                            <>
                                <span className="sb-item sb-hide-xs" title="Auto-save is disabled" style={{ color: '#f59e0b' }}>
                                    <i className="fas fa-cloud-arrow-up"></i>
                                    Auto-save off
                                </span>
                                <span className="sb-divider sb-hide-xs"></span>
                            </>
                        )}
                        <span className="sb-item sb-hide-sm" title="Active tab" style={{ maxWidth: 140, overflow: 'hidden', textOverflow: 'ellipsis' }}>
                            <i className="fas fa-file-lines"></i>
                            <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{currentTab?.name}</span>
                        </span>
                        <span className="sb-divider sb-hide-sm"></span>
                        <button className="sb-item sb-hide-md" onClick={() => setShortcutsOpen(true)} title="Keyboard shortcuts" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'inherit', padding: 0, font: 'inherit' }}>
                            <i className="fas fa-keyboard"></i>
                            Shortcuts
                        </button>
                        <span className="sb-divider sb-hide-md"></span>
                        <span className="sb-item sb-hide-md" title="Press Ctrl+K for command palette">
                            <kbd>Ctrl</kbd>+<kbd>K</kbd>
                        </span>
                    </div>

                    <LoadingSpinner isLoading={isLoading} message={loadingMessage} />

                    <FindReplaceModal
                        isOpen={findOpen}
                        onClose={() => setFindOpen(false)}
                        getText={() => quillInstance ? quillInstance.getText() : text}
                        setTextFn={(t) => setText(t)}
                        showToast={showToast}
                    />

                    <CommandPalette
                        isOpen={paletteOpen}
                        onClose={() => setPaletteOpen(false)}
                        commands={commands}
                    />

                    {/* Keyboard Shortcuts Modal */}
                    {shortcutsOpen && (
                        <div className="modal-overlay" onClick={() => setShortcutsOpen(false)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, backdropFilter: 'blur(4px)' }}>
                            <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, width: '100%', maxWidth: 720, maxHeight: '85vh', overflow: 'auto', boxShadow: '0 20px 50px rgba(0,0,0,0.4)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 22px', borderBottom: '1px solid var(--border)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <span className="panel-title-icon" style={{ background: 'rgba(59,130,246,0.12)', color: '#3b82f6' }}><i className="fas fa-keyboard"></i></span>
                                        <div style={{ fontWeight: 700, fontSize: 17, color: 'var(--text)' }}>Keyboard Shortcuts</div>
                                    </div>
                                    <button className="icon-btn" onClick={() => setShortcutsOpen(false)} title="Close"><i className="fas fa-xmark"></i></button>
                                </div>
                                <div style={{ padding: '18px 22px' }}>
                                    {[
                                        { title: 'General', items: [
                                            ['Open command palette', 'Ctrl+K'],
                                            ['Find & Replace', 'Ctrl+F'],
                                            ['Save as TXT', 'Ctrl+S'],
                                            ['Toggle dark mode', 'Ctrl+Shift+D'],
                                            ['Toggle focus mode', 'F11'],
                                        ]},
                                        { title: 'Editing', items: [
                                            ['Undo', 'Ctrl+Z'],
                                            ['Redo', 'Ctrl+Y / Ctrl+Shift+Z'],
                                            ['Bold / Italic / Underline', 'Ctrl+B / I / U'],
                                            ['Select all', 'Ctrl+A'],
                                        ]},
                                        { title: 'Tabs', items: [
                                            ['New tab', 'Ctrl+T'],
                                            ['Close current tab', 'Ctrl+W'],
                                            ['Reopen recently closed tab', 'Ctrl+Shift+T'],
                                            ['Next / Previous tab', 'Ctrl+Tab / Ctrl+Shift+Tab'],
                                            ['Jump to tab 1–9', 'Ctrl+1 … Ctrl+9'],
                                        ]},
                                    ].map((section, si) => (
                                        <div key={si} style={{ marginBottom: 18 }}>
                                            <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'var(--text-mute)', fontWeight: 700, marginBottom: 8 }}>{section.title}</div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr auto', gap: 6 }}>
                                                {section.items.map((row, i) => (
                                                    <React.Fragment key={i}>
                                                        <div style={{ padding: '8px 10px', borderRadius: 8, background: 'var(--surface-2)', border: '1px solid var(--border)', fontSize: 13, color: 'var(--text)' }}>{row[0]}</div>
                                                        <div style={{ padding: '8px 12px', borderRadius: 8, background: 'var(--surface-2)', border: '1px solid var(--border)', fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: 'var(--accent)', fontWeight: 600, whiteSpace: 'nowrap' }}>{row[1]}</div>
                                                    </React.Fragment>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* About Modal */}
                    {aboutOpen && (
                        <div className="modal-overlay" onClick={() => setAboutOpen(false)} style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.55)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16, backdropFilter: 'blur(4px)' }}>
                            <div onClick={(e) => e.stopPropagation()} style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 14, width: '100%', maxWidth: 540, boxShadow: '0 20px 50px rgba(0,0,0,0.4)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '18px 22px', borderBottom: '1px solid var(--border)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                        <span className="panel-title-icon" style={{ background: 'rgba(168,85,247,0.12)', color: '#a855f7' }}><i className="fas fa-circle-info"></i></span>
                                        <div style={{ fontWeight: 700, fontSize: 17, color: 'var(--text)' }}>About Text Manipulator Pro</div>
                                    </div>
                                    <button className="icon-btn" onClick={() => setAboutOpen(false)} title="Close"><i className="fas fa-xmark"></i></button>
                                </div>
                                <div style={{ padding: '22px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 16 }}>
                                        <div style={{ width: 56, height: 56, borderRadius: 14, background: 'linear-gradient(135deg, #3b82f6, #a855f7)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontSize: 24, boxShadow: '0 8px 20px rgba(59,130,246,0.35)' }}>
                                            <i className="fas fa-feather-pointed"></i>
                                        </div>
                                        <div>
                                            <div style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)' }}>Text Manipulator Pro</div>
                                            <div style={{ fontSize: 12, color: 'var(--text-mute)' }}>Version 3.0 · Single-file edition</div>
                                        </div>
                                    </div>
                                    <p style={{ fontSize: 13, lineHeight: 1.65, color: 'var(--text)', marginBottom: 14 }}>
                                        A privacy-first text manipulation suite that runs entirely in your browser.
                                        No servers, no tracking, no uploads — all transformations happen locally.
                                    </p>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 }}>
                                        {[
                                            ['200+', 'Transformations'],
                                            ['16', 'Categories'],
                                            ['100%', 'Local & private'],
                                            ['0', 'Network requests'],
                                        ].map(([v, l], i) => (
                                            <div key={i} style={{ padding: '12px', borderRadius: 10, background: 'var(--surface-2)', border: '1px solid var(--border)', textAlign: 'center' }}>
                                                <div style={{ fontSize: 22, fontWeight: 800, color: 'var(--accent)' }}>{v}</div>
                                                <div style={{ fontSize: 11, color: 'var(--text-mute)', textTransform: 'uppercase', letterSpacing: '0.04em' }}>{l}</div>
                                            </div>
                                        ))}
                                    </div>
                                    <div style={{ fontSize: 11, color: 'var(--text-mute)', textAlign: 'center', borderTop: '1px solid var(--border)', paddingTop: 12 }}>
                                        Built with React, Quill, jsPDF & Tailwind CSS
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div style={{ position: 'fixed', top: 70, right: 16, zIndex: 100, display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {toasts.map(t => (
                            <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)} />
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<ErrorBoundary><App /></ErrorBoundary>, document.getElementById('root'));
    </script>
</body>
</html>
