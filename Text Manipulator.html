<!DOCTYPE html>
<!--
Text Manipulator Pro — Enhanced Edition
========================================
A sleek, modern text manipulation tool with refined UX and micro-animations.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Text Manipulator Pro — a sleek, modern text manipulation tool with 100+ operations: case conversion, encoding, hashing, line operations, statistics, and more.">
    <meta name="theme-color" content="#3b82f6">
    <title>Text Manipulator Pro v3.0</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%233b82f6'/%3E%3Cstop offset='50%25' stop-color='%23818cf8'/%3E%3Cstop offset='100%25' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-family='Inter,Arial' font-weight='800' font-size='62' fill='white'%3ET%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <style>
        :root {
            --accent: #3b82f6;
            --accent-2: #818cf8;
            --accent-3: #06b6d4;
            --bg: #f7f8fc;
            --surface: #ffffff;
            --surface-2: #f1f3f9;
            --border: #e5e7ef;
            --text: #0f172a;
            --text-soft: #475569;
            --text-mute: #94a3b8;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, 0.06), 0 2px 4px -1px rgba(15, 23, 42, 0.04);
            --shadow-lg: 0 12px 28px -8px rgba(59, 130, 246, 0.18), 0 4px 8px -2px rgba(15, 23, 42, 0.06);
        }

        .dark {
            --bg: #0a0e1a;
            --surface: #131826;
            --surface-2: #1a2032;
            --border: #252b3d;
            --text: #f1f5f9;
            --text-soft: #cbd5e1;
            --text-mute: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px -2px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 28px -8px rgba(59, 130, 246, 0.35), 0 4px 8px -2px rgba(0, 0, 0, 0.4);
        }

        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.05) 0px, transparent 50%);
        }

        .dark body, body.dark-bg {
            background-image:
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.08) 0px, transparent 50%);
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar,
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 8px;
            transition: background 0.2s;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-mute);
        }

        /* ===== Animations ===== */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes slideOutRight { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
        @keyframes pop { 0% { transform: scale(0.96); opacity: 0; } 60% { transform: scale(1.02); } 100% { transform: scale(1); opacity: 1; } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .fade-in { animation: fadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
        .pop-in { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .toast-exit { animation: slideOutRight 0.25s ease-in forwards; }
        .tab-content { animation: fadeIn 0.25s ease-out; }

        /* ===== Layout ===== */
        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== Top Bar ===== */
        .topbar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 30;
        }
        .dark .topbar {
            background: rgba(19, 24, 38, 0.75);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: -0.01em;
        }
        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, #3b82f6, #818cf8, #06b6d4);
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            box-shadow: 0 4px 12px -2px rgba(59, 130, 246, 0.45);
        }

        .stat-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            background: var(--surface-2);
            font-size: 11.5px;
            font-weight: 500;
            color: var(--text-soft);
            transition: all 0.2s ease;
        }
        .stat-pill .num {
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            transition: color 0.2s;
        }
        .stat-pill.c .num { color: #3b82f6; }
        .stat-pill.w .num { color: #10b981; }
        .stat-pill.l .num { color: #f59e0b; }
        .stat-pill.p .num { color: #06b6d4; }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 9px;
            color: var(--text-soft);
            background: transparent;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .icon-btn:hover {
            background: var(--surface-2);
            color: var(--text);
            transform: translateY(-1px);
        }
        .icon-btn:active { transform: translateY(0); }
        .icon-btn.primary {
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            color: white;
            box-shadow: 0 4px 12px -3px rgba(59, 130, 246, 0.5);
        }
        .icon-btn.primary:hover {
            box-shadow: 0 6px 18px -3px rgba(59, 130, 246, 0.6);
            color: white;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }
        .sidebar-collapsed { width: 64px; }
        .sidebar-expanded { width: 232px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            margin: 2px 8px;
            border-radius: 10px;
            color: var(--text-soft);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13.5px;
            font-weight: 500;
            position: relative;
            white-space: nowrap;
        }
        .nav-item > span:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-item .nav-icon {
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text-soft);
            font-size: 13px;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .nav-item:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .nav-item:hover .nav-icon {
            transform: scale(1.08) rotate(-3deg);
        }
        .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.12), rgba(129, 140, 248, 0.06));
            color: #3b82f6;
            font-weight: 600;
        }
        .dark .nav-item.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.22), rgba(129, 140, 248, 0.1));
            color: #93c5fd;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 22px;
            background: linear-gradient(180deg, #3b82f6, #818cf8);
            border-radius: 0 3px 3px 0;
        }
        .nav-item.active .nav-icon {
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            color: white;
            box-shadow: 0 4px 10px -2px rgba(59, 130, 246, 0.5);
        }
        .nav-section-label {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text-mute);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 14px 16px 6px;
        }

        /* ===== Tab Bar ===== */
        .tabbar {
            display: flex;
            align-items: center;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 8px;
            min-height: 38px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabbar::-webkit-scrollbar { display: none; }
        .tab {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            margin: 4px 2px;
            border-radius: 8px;
            font-size: 12.5px;
            font-weight: 500;
            color: var(--text-soft);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            position: relative;
        }
        .tab:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .tab.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(129, 140, 248, 0.08));
            color: #3b82f6;
        }
        .dark .tab.active { color: #93c5fd; }
        .tab .close-x {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            font-size: 9px;
            opacity: 0.6;
            transition: all 0.15s;
        }
        .tab .close-x:hover {
            opacity: 1;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        /* ===== Cards & Panels ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .card-hover:hover {
            box-shadow: var(--shadow-md);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
        }
        .panel-title-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }
        .panel-subtitle {
            font-size: 11.5px;
            color: var(--text-mute);
            margin-left: auto;
            font-weight: 500;
        }

        .info-banner {
            display: flex;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 11px;
            font-size: 12.5px;
            line-height: 1.55;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.07), rgba(129, 140, 248, 0.04));
            border: 1px solid rgba(59, 130, 246, 0.15);
            color: var(--text-soft);
        }
        .dark .info-banner {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(129, 140, 248, 0.06));
            border-color: rgba(59, 130, 246, 0.25);
        }
        .info-banner .info-icon {
            color: #3b82f6;
            font-size: 14px;
            margin-top: 2px;
        }
        .info-banner.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.07), rgba(5, 150, 105, 0.04));
            border-color: rgba(16, 185, 129, 0.2);
        }
        .info-banner.success .info-icon { color: #10b981; }
        .info-banner.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.07), rgba(217, 119, 6, 0.04));
            border-color: rgba(245, 158, 11, 0.2);
        }
        .info-banner.warning .info-icon { color: #f59e0b; }

        /* ===== Action Buttons ===== */
        .action-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 600;
            letter-spacing: -0.01em;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            white-space: nowrap;
        }
        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--btn-c1, #3b82f6), var(--btn-c2, #818cf8));
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 0;
        }
        .action-btn > * { position: relative; z-index: 1; transition: color 0.25s; }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(var(--btn-glow, 59, 130, 246), 0.45);
            border-color: transparent;
        }
        .action-btn:hover::before { opacity: 1; }
        .action-btn:hover > * { color: white; }
        .action-btn:active { transform: translateY(-1px); }
        .action-btn .icon-wrap {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            background: var(--surface-2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--accent-color, #3b82f6);
            transition: all 0.25s ease;
        }
        .action-btn:hover .icon-wrap {
            background: rgba(255, 255, 255, 0.22);
            color: white;
            transform: scale(1.08);
        }

        /* Variant colors */
        .btn-indigo { --btn-c1: #3b82f6; --btn-c2: #818cf8; --btn-glow: 59, 130, 246; --accent-color: #3b82f6; }
        .btn-violet { --btn-c1: #818cf8; --btn-c2: #a855f7; --btn-glow: 129, 140, 248; --accent-color: #818cf8; }
        .btn-pink   { --btn-c1: #06b6d4; --btn-c2: #f43f5e; --btn-glow: 6, 182, 212; --accent-color: #06b6d4; }
        .btn-rose   { --btn-c1: #f43f5e; --btn-c2: #e11d48; --btn-glow: 244, 63, 94; --accent-color: #f43f5e; }
        .btn-amber  { --btn-c1: #f59e0b; --btn-c2: #f97316; --btn-glow: 245, 158, 11; --accent-color: #f59e0b; }
        .btn-emerald{ --btn-c1: #10b981; --btn-c2: #059669; --btn-glow: 16, 185, 129; --accent-color: #10b981; }
        .btn-teal   { --btn-c1: #14b8a6; --btn-c2: #06b6d4; --btn-glow: 20, 184, 166; --accent-color: #14b8a6; }
        .btn-sky    { --btn-c1: #0ea5e9; --btn-c2: #3b82f6; --btn-glow: 14, 165, 233; --accent-color: #0ea5e9; }
        .btn-blue   { --btn-c1: #3b82f6; --btn-c2: #818cf8; --btn-glow: 59, 130, 246; --accent-color: #3b82f6; }
        .btn-slate  { --btn-c1: #64748b; --btn-c2: #475569; --btn-glow: 100, 116, 139; --accent-color: #64748b; }
        .btn-orange { --btn-c1: #f97316; --btn-c2: #ea580c; --btn-glow: 249, 115, 22; --accent-color: #f97316; }
        .btn-red    { --btn-c1: #ef4444; --btn-c2: #dc2626; --btn-glow: 239, 68, 68; --accent-color: #ef4444; }
        .btn-yellow { --btn-c1: #eab308; --btn-c2: #ca8a04; --btn-glow: 234, 179, 8; --accent-color: #eab308; }
        .btn-fuchsia{ --btn-c1: #d946ef; --btn-c2: #a855f7; --btn-glow: 217, 70, 239; --accent-color: #d946ef; }
        .btn-cyan   { --btn-c1: #06b6d4; --btn-c2: #0891b2; --btn-glow: 6, 182, 212; --accent-color: #06b6d4; }

        /* ===== Inputs ===== */
        .input, .textarea, .number-input {
            width: 100%;
            padding: 9px 12px;
            font-size: 13px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .input:focus, .textarea:focus, .number-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }
        .input::placeholder { color: var(--text-mute); }
        .field-label {
            display: block;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-soft);
            margin-bottom: 6px;
            letter-spacing: 0.01em;
        }

        /* Modern checkbox */
        .check-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 9px;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 12.5px;
            color: var(--text-soft);
        }
        .check-row:hover { background: var(--surface-2); }
        .check-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            background: var(--surface);
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }
        .check-row input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            border-color: #3b82f6;
        }
        .check-row input[type="checkbox"]:checked::after {
            content: '\2713';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        /* ===== Drop zone ===== */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.3s ease;
            background: var(--surface);
            cursor: pointer;
        }
        .dropzone:hover {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.03);
        }
        .dropzone.dragover {
            border-color: #3b82f6;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.07), rgba(129, 140, 248, 0.05));
            transform: scale(1.01);
        }
        .dropzone-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(129, 140, 248, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #3b82f6;
            transition: transform 0.3s ease;
        }
        .dropzone.dragover .dropzone-icon {
            transform: scale(1.1) rotate(-6deg);
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            color: white;
        }

        /* ===== Toast ===== */
        .toast {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 280px;
            max-width: 380px;
            padding: 12px 14px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            backdrop-filter: blur(20px);
        }
        .toast .toast-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            color: white;
        }
        .toast.success .toast-icon { background: linear-gradient(135deg, #10b981, #059669); }
        .toast.error   .toast-icon { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast.warning .toast-icon { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .toast.info    .toast-icon { background: linear-gradient(135deg, #3b82f6, #818cf8); }
        .toast.success { border-left: 3px solid #10b981; }
        .toast.error   { border-left: 3px solid #ef4444; }
        .toast.warning { border-left: 3px solid #f59e0b; }
        .toast.info    { border-left: 3px solid #3b82f6; }

        /* ===== Loading Spinner ===== */
        .spinner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.2s ease;
        }
        .spinner-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow-lg);
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .spinner {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2.5px solid var(--border);
            border-top-color: #3b82f6;
            border-right-color: #818cf8;
            animation: spin 0.7s linear infinite;
        }

        /* ===== Quill editor restyle ===== */
        .ql-toolbar.ql-snow {
            border: none !important;
            border-bottom: 1px solid var(--border) !important;
            background: var(--surface);
            padding: 8px 10px !important;
            border-radius: 14px 14px 0 0;
        }
        .ql-container.ql-snow {
            border: none !important;
            font-family: 'Inter', sans-serif;
            border-radius: 0 0 14px 14px;
            background: var(--surface);
        }
        .editor-shell {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.25s, border-color 0.25s;
        }
        .editor-shell:focus-within {
            border-color: rgba(59, 130, 246, 0.4);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08), var(--shadow-md);
        }
        .ql-editor {
            min-height: 280px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.65;
            padding: 16px 18px !important;
        }
        .ql-editor.ql-blank::before {
            color: var(--text-mute) !important;
            font-style: normal !important;
            font-size: 14px;
            left: 18px !important;
        }
        .dark .ql-toolbar.ql-snow,
        .dark .ql-container.ql-snow {
            background: var(--surface);
        }
        .dark .ql-editor { color: var(--text); }
        .dark .ql-toolbar .ql-stroke { stroke: var(--text-soft); }
        .dark .ql-toolbar .ql-fill { fill: var(--text-soft); }
        .dark .ql-toolbar button:hover .ql-stroke,
        .dark .ql-toolbar .ql-picker-label:hover .ql-stroke { stroke: #93c5fd; }
        .dark .ql-toolbar button:hover .ql-fill { fill: #93c5fd; }
        .dark .ql-picker-label { color: var(--text-soft) !important; }
        .dark .ql-picker-options {
            background: var(--surface-2) !important;
            border-color: var(--border) !important;
            color: #93c5fd;
        }

        .ql-toolbar.ql-snow button,
        .ql-toolbar.ql-snow .ql-picker-label {
            border-radius: 6px;
            transition: all 0.15s;
        }
        .ql-toolbar.ql-snow button:hover,
        .ql-toolbar.ql-snow .ql-picker-label:hover {
            background: var(--surface-2);
        }
        .ql-toolbar.ql-snow button.ql-active {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
        }
        .dark .ql-toolbar.ql-snow button.ql-active {
            background: rgba(147, 197, 253, 0.15);
        }

        /* Custom case operations dropdown */
        .ql-case { width: auto !important; }
        .ql-case .ql-picker-label {
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 600;
        }
        .ql-case .ql-picker-label::before { content: 'Aa'; font-weight: bold; }
        .ql-case .ql-picker-options { min-width: 130px; }
        .ql-case .ql-picker-item[data-value="case-upper"]::before { content: 'UPPERCASE'; }
        .ql-case .ql-picker-item[data-value="case-lower"]::before { content: 'lowercase'; }
        .ql-case .ql-picker-item[data-value="case-title"]::before { content: 'Title Case'; }
        .ql-case .ql-picker-item[data-value="case-swap"]::before { content: 'sWAP cASE'; }
        .ql-case .ql-picker-item[data-value="case-sentence"]::before { content: 'Sentence case'; }

        .ql-trim-whitespace::before, .ql-remove-extra-spaces::before, .ql-reverse-text::before, .ql-highlight::before {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
        }
        .ql-trim-whitespace::before { content: '\f0c4'; }
        .ql-remove-extra-spaces::before { content: '\f066'; }
        .ql-reverse-text::before { content: '\f0e2'; }
        .ql-highlight::before { content: '\f591'; color: #f59e0b; }

        .ql-editor .highlight {
            background-color: #fef3c7;
            color: #92400e;
            padding: 1px 3px;
            border-radius: 3px;
        }
        .dark .ql-editor .highlight {
            background-color: #451a03;
            color: #fbbf24;
        }

        /* Tooltip */
        .ql-toolbar [title]:hover::after {
            content: attr(title);
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: white;
            padding: 7px 10px;
            border-radius: 7px;
            font-size: 11.5px;
            font-weight: 500;
            max-width: 280px;
            white-space: normal;
            text-align: center;
            line-height: 1.4;
            min-width: 100px;
            z-index: 50;
            box-shadow: 0 8px 16px -4px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        /* ===== Accessibility ===== */
        :focus-visible {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
            border-radius: 4px;
        }
        .icon-btn:focus-visible,
        .action-btn:focus-visible,
        .nav-item:focus-visible,
        .tab:focus-visible {
            outline-offset: 1px;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* Disabled state */
        .action-btn:disabled,
        .action-btn[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .action-btn:disabled::before,
        .action-btn[disabled]::before { opacity: 0 !important; }
        .action-btn:disabled:hover > *,
        .action-btn[disabled]:hover > * { color: var(--text-mute) !important; }

        /* Tab name truncation & pinned tabs */
        .tab > span:not(.close-x) { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; vertical-align: middle; }
        .tab.pinned i.fa-thumbtack { color: #3b82f6; }

        /* ===== Editor Footer ===== */
        .editor-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px;
            font-size: 12px;
            font-weight: 600;
            border: none;
            border-top: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-soft);
            cursor: pointer;
            transition: all 0.2s;
        }
        .editor-toggle-btn:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .editor-toggle-btn i { transition: transform 0.3s; }
        .editor-toggle-btn.expanded i { transform: rotate(180deg); }
        .editor-line-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 9px;
            border-radius: 9999px;
            font-size: 10.5px;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.12);
            color: #3b82f6;
        }

        .editor-collapsed .ql-editor {
            max-height: 380px !important;
            overflow-y: auto !important;
        }
        .editor-collapsed .ql-container { max-height: 380px !important; }

        .fullscreen-editor .ql-editor {
            min-height: calc(100vh - 130px);
            height: calc(100vh - 130px);
        }
        .fullscreen-editor .ql-container { height: calc(100vh - 130px); }

        /* Floating scroll buttons */
        .editor-scroll-nav {
            position: fixed;
            right: 22px;
            bottom: 22px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 40;
        }
        .editor-scroll-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px -4px rgba(59, 130, 246, 0.4);
            font-size: 13px;
        }
        .editor-scroll-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 24px -4px rgba(59, 130, 246, 0.55);
        }
        .editor-scroll-btn:active { transform: translateY(-1px); }

        /* ===== Mobile Menu ===== */
        .mobile-menu-toggle { display: none; }

        /* Examples list */
        .ex-list { font-size: 12px; line-height: 1.7; }
        .ex-list li { color: var(--text-soft); }
        .ex-list li strong { color: var(--text); margin-right: 4px; }

        /* Doc info chips */
        .doc-chip {
            display: inline-flex;
            flex-direction: column;
            gap: 2px;
            padding: 8px 12px;
            background: var(--surface-2);
            border-radius: 9px;
            font-size: 12px;
        }
        .doc-chip .label {
            font-size: 10.5px;
            color: var(--text-mute);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .doc-chip .value { color: var(--text); font-weight: 500; }

        /* Section spacing */
        .stack-md > * + * { margin-top: 16px; }
        .stack-lg > * + * { margin-top: 22px; }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 5px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-soft);
            font-variant-numeric: tabular-nums;
            min-height: 24px;
        }
        .status-bar .sb-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .status-bar .sb-item i { color: var(--text-mute); font-size: 10px; }
        .status-bar .sb-divider {
            width: 1px;
            height: 12px;
            background: var(--border);
        }
        .status-bar .sb-spacer { flex: 1; }
        .status-bar kbd {
            background: var(--surface-2);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-soft);
        }

        /* Keyboard shortcut hints in tooltips */
        .shortcut-hint {
            display: inline-flex;
            gap: 3px;
            margin-left: 6px;
        }
        .shortcut-hint kbd {
            background: rgba(255,255,255,0.15);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Section header */
        .section-h {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 12px;
            padding-left: 2px;
        }
        .section-h .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #818cf8);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { position: fixed; top: 0; bottom: 0; left: 0; z-index: 50; box-shadow: var(--shadow-lg); transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar { width: 260px; }
            .sidebar.mobile-open { transform: translateX(0); }
            .sidebar-expanded { width: 260px; }
            .mobile-menu-toggle { display: inline-flex !important; }
            .stat-pill.l, .stat-pill.p { display: none; }
            .status-bar { font-size: 10.5px; gap: 8px; flex-wrap: wrap; padding: 5px 10px; }
            .status-bar .sb-divider { display: none; }
            .status-bar .sb-spacer { flex-basis: 100%; height: 0; }
            .status-bar .sb-hide-md { display: none !important; }
        }
        @media (max-width: 640px) {
            .stat-pill.w { display: none; }
            .brand-text { display: none; }
            .topbar .icon-btn { width: 32px; height: 32px; }
            .editor-scroll-nav { right: 12px; bottom: 50px; }
            .status-bar .sb-hide-sm { display: none !important; }
            .status-bar { gap: 6px; }
            .status-bar .sb-item { font-size: 10px; }
        }
        @media (max-width: 480px) {
            .stat-pill.c { display: none; }
            .topbar-actions-secondary { display: none; }
            .status-bar .sb-hide-xs { display: none !important; }
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 40;
            animation: fadeIn 0.2s;
        }
        .mobile-overlay.active { display: block; }

        /* Word wrap toggle */
        .wordwrap-on .ql-editor {
            white-space: pre-wrap;
            word-break: break-word;
        }
        .wordwrap-off .ql-editor {
            white-space: pre;
            overflow-x: auto;
        }

        /* Session import area */
        .import-session-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11.5px;
            font-weight: 600;
            color: var(--text-soft);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
            border: 1.5px dashed var(--border);
        }
        .import-session-btn:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
        }

        /* Ql editor dark mode selection */
        .dark .ql-editor ::selection { background: rgba(59, 130, 246, 0.3); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // ============= Error Boundary Component =============
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error('Error caught by boundary:', error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ width: '100vw', height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg, #0f172a 0%, #1a1f35 100%)', color: 'white', textAlign: 'center', padding: '40px', fontFamily: 'Inter, sans-serif' }}>
                            <div style={{ maxWidth: '500px' }}>
                                <div style={{ fontSize: '48px', marginBottom: '20px' }}>⚠️</div>
                                <h1 style={{ fontSize: '28px', fontWeight: 700, marginBottom: '12px' }}>Oops! Something went wrong</h1>
                                <p style={{ fontSize: '16px', color: '#cbd5e1', marginBottom: '24px', lineHeight: '1.6' }}>
                                    {this.state.error?.message || 'The application encountered an unexpected error.'}
                                </p>
                                <button onClick={() => { localStorage.removeItem('tm_tabs'); localStorage.removeItem('tm_activeTab'); window.location.reload(); }} style={{ padding: '12px 28px', background: 'linear-gradient(135deg, #3b82f6, #818cf8)', color: 'white', border: 'none', borderRadius: '10px', fontSize: '16px', fontWeight: 600, cursor: 'pointer', transition: 'all 0.2s ease' }}>
                                    Reload & Clear Storage
                                </button>
                                <p style={{ fontSize: '13px', color: '#64748b', marginTop: '20px' }}>If the problem persists, try clearing your browser cache.</p>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ============= Toast Component =============
        function Toast({ message, type, onClose }) {
            const [isVisible, setIsVisible] = React.useState(true);

            React.useEffect(() => {
                const timer = setTimeout(() => {
                    setIsVisible(false);
                    setTimeout(onClose, 250);
                }, 3200);
                return () => clearTimeout(timer);
            }, [onClose]);

            const icons = {
                success: 'fa-check',
                error: 'fa-times',
                info: 'fa-info',
                warning: 'fa-exclamation'
            };

            return (
                <div className={`toast ${type} ${isVisible ? 'toast-enter' : 'toast-exit'}`}>
                    <div className="toast-icon">
                        <i className={`fas ${icons[type]}`}></i>
                    </div>
                    <span className="flex-1">{message}</span>
                    <button onClick={() => { setIsVisible(false); setTimeout(onClose, 250); }}
                            style={{ color: 'var(--text-mute)', fontSize: '14px', padding: '4px' }}
                            className="hover:text-red-500 transition-colors">
                        <i className="fas fa-times"></i>
                    </button>
                </div>
            );
        }

        // ============= Loading Spinner =============
        function LoadingSpinner({ isLoading, message }) {
            if (!isLoading) return null;
            return (
                <div className="spinner-overlay">
                    <div className="spinner-card">
                        <div className="spinner"></div>
                        <span style={{ fontSize: '13.5px', fontWeight: 500 }}>{message}</span>
                    </div>
                </div>
            );
        }

        // ============= Sidebar =============
        function Sidebar({ activeCategory, setActiveCategory, categories, isCollapsed, setIsCollapsed, mobileOpen, closeMobile }) {
            return (
                <>
                    <div className={`mobile-overlay ${mobileOpen ? 'active' : ''}`} onClick={closeMobile} aria-hidden="true"></div>
                    <aside className={`sidebar ${isCollapsed ? 'sidebar-collapsed' : 'sidebar-expanded'} ${mobileOpen ? 'mobile-open' : ''}`} aria-label="Category navigation">
                        <div style={{ padding: '14px 12px 6px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            {!isCollapsed && <span className="nav-section-label" style={{ padding: 0 }}>Workspace</span>}
                            <button
                                onClick={() => setIsCollapsed(!isCollapsed)}
                                className="icon-btn"
                                style={{ width: 28, height: 28, marginLeft: 'auto' }}
                                title={isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}
                            >
                                <i className={`fas fa-angles-${isCollapsed ? 'right' : 'left'}`} style={{ fontSize: 11 }}></i>
                            </button>
                        </div>
                        <nav style={{ flex: 1, paddingTop: 4, overflowY: 'auto' }}>
                            {categories.map((category, idx) => (
                                <div
                                    key={category.id}
                                    onClick={() => { setActiveCategory(category.id); closeMobile(); }}
                                    onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setActiveCategory(category.id); closeMobile(); } }}
                                    className={`nav-item ${activeCategory === category.id ? 'active' : ''}`}
                                    title={isCollapsed ? category.name : ''}
                                    role="button"
                                    tabIndex={0}
                                    aria-current={activeCategory === category.id ? 'page' : undefined}
                                >
                                    <span className="nav-icon" aria-hidden="true"><i className={category.icon}></i></span>
                                    {!isCollapsed && <span>{category.name}</span>}
                                </div>
                            ))}
                        </nav>
                        {!isCollapsed && (
                            <div style={{ padding: '12px 14px', borderTop: '1px solid var(--border)', fontSize: 11, color: 'var(--text-mute)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#10b981', boxShadow: '0 0 0 3px rgba(16,185,129,0.2)' }}></span>
                                    <span>v2.0 · All systems go</span>
                                </div>
                            </div>
                        )}
                    </aside>
                </>
            );
        }

        // ============= Command Palette =============
        function CommandPalette({ isOpen, onClose, commands }) {
            const [query, setQuery] = React.useState('');
            const [selectedIdx, setSelectedIdx] = React.useState(0);
            const inputRef = React.useRef(null);
            const listRef = React.useRef(null);

            React.useEffect(() => {
                if (isOpen) {
                    setQuery(''); setSelectedIdx(0);
                    setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
                }
            }, [isOpen]);

            const filtered = React.useMemo(() => {
                const q = query.toLowerCase().trim();
                if (!q) return commands.slice(0, 50);
                return commands.filter(c =>
                    c.name.toLowerCase().includes(q) ||
                    (c.category && c.category.toLowerCase().includes(q)) ||
                    (c.keywords && c.keywords.some(k => k.toLowerCase().includes(q)))
                ).slice(0, 50);
            }, [query, commands]);

            React.useEffect(() => { setSelectedIdx(0); }, [query]);

            const onKey = (e) => {
                if (e.key === 'Escape') onClose();
                else if (e.key === 'ArrowDown') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, filtered.length - 1)); }
                else if (e.key === 'ArrowUp') { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, 0)); }
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    const cmd = filtered[selectedIdx];
                    if (cmd) { onClose(); setTimeout(() => cmd.action(), 50); }
                }
            };

            React.useEffect(() => {
                if (listRef.current) {

        // ============= Find & Replace Modal =============
        function FindReplaceModal({ isOpen, onClose, getText, setTextFn, showToast }) {
            const [findText, setFindText] = React.useState('');
            const [replaceText, setReplaceText] = React.useState('');
            const [caseSensitive, setCaseSensitive] = React.useState(false);
            const [wholeWord, setWholeWord] = React.useState(false);
            const [useRegex, setUseRegex] = React.useState(false);
            const [matchCount, setMatchCount] = React.useState(0);
            const [error, setError] = React.useState('');
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                if (isOpen) setTimeout(() => inputRef.current && inputRef.current.focus(), 100);
            }, [isOpen]);

            const buildRegex = () => {
                if (!findText) return null;
                let pattern = findText;
                let flags = caseSensitive ? 'g' : 'gi';
                if (!useRegex) pattern = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                if (wholeWord) pattern = `\\b${pattern}\\b`;
                try {
                    const re = new RegExp(pattern, flags);
                    const testStr = 'a'.repeat(1000);
                    const startTime = performance.now();
                    const testMatch = testStr.match(re);
                    const elapsed = performance.now() - startTime;
                    if (elapsed > 1000) {
                        setError('Regex pattern too complex (potential catastrophic backtracking)');
                        return null;
                    }
                    return re;
                } catch (e) {
                    setError('Invalid regex: ' + e.message);
                    return null;
                }
            };

            React.useEffect(() => {
                if (!findText) { setMatchCount(0); setError(''); return; }
                try {
                    const re = buildRegex();
                    if (!re) return; // buildRegex already set error state
                    const matches = (getText() || '').match(re);
                    setMatchCount(matches ? matches.length : 0);
                    setError('');
                } catch (e) { setError(e.message); setMatchCount(0); }
            }, [findText, caseSensitive, wholeWord, useRegex, isOpen]);

            const doReplace = (all) => {
                try {
                    const re = buildRegex();
                    if (!re) return;
                    const cur = getText() || '';
                    if (all) {
                        const newText = cur.replace(re, replaceText);
                        const matches = cur.match(re);
                        const n = matches ? matches.length : 0;
                        setTextFn(newText);
                        showToast(`Replaced ${n} occurrence${n !== 1 ? 's' : ''}`, 'success');
                    } else {
                        let replaced = false;
                        const newText = cur.replace(re, (m) => { if (replaced) return m; replaced = true; return replaceText; });
                        if (replaced) {
                            setTextFn(newText);
                            showToast('Replaced first occurrence', 'success');
                        } else showToast('No match found', 'warning');
                    }
                } catch (e) { showToast('Replace failed: ' + e.message, 'error'); }
            };

            if (!isOpen) return null;
            return (
                <div className="spinner-overlay" onClick={onClose} style={{ alignItems: 'flex-start', paddingTop: '8vh' }}>
                    <div className="card pop-in" onClick={(e) => e.stopPropagation()}
                        style={{ width: 'min(520px, 92vw)', padding: 22 }}>
                        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 15, fontWeight: 700 }}>
                                <span className="panel-title-icon" style={{ background: 'rgba(59,130,246,0.12)', color: '#3b82f6' }}>
                                    <i className="fas fa-magnifying-glass"></i>
                                </span>
                                Find & Replace
                            </div>
                            <button onClick={onClose} className="icon-btn" title="Close (Esc)">
                                <i className="fas fa-times"></i>
                            </button>
                        </div>
                        <div className="stack-md">
                            <div>
                                <label className="field-label">Find</label>
                                <input ref={inputRef} className="input" value={findText}
                                    onChange={(e) => setFindText(e.target.value)}
                                    placeholder="Search text or regex pattern…"
                                    onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) doReplace(false); if (e.key === 'Escape') onClose(); }} />
                                <div style={{ fontSize: 11.5, marginTop: 6, color: error ? '#ef4444' : 'var(--text-mute)' }}>
                                    {error ? <><i className="fas fa-triangle-exclamation"></i> {error}</> :
                                     findText ? <>{matchCount} match{matchCount !== 1 ? 'es' : ''} found</> :
                                     'Press Enter to replace, Shift+Enter to insert newline in replacement'}
                                </div>
                            </div>
                            <div>
                                <label className="field-label">Replace with</label>
                                <input className="input" value={replaceText}
                                    onChange={(e) => setReplaceText(e.target.value)}
                                    placeholder="Replacement text (use $1, $2 with regex)"
                                    onKeyDown={(e) => { if (e.key === 'Enter') doReplace(false); if (e.key === 'Escape') onClose(); }} />
                            </div>
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
                                <label className="check-row" style={{ flex: '1 1 auto' }}>
                                    <input type="checkbox" checked={caseSensitive} onChange={(e) => setCaseSensitive(e.target.checked)} />
                                    <span>Case sensitive</span>
                                </label>
                                <label className="check-row" style={{ flex: '1 1 auto' }}>
                                    <input type="checkbox" checked={wholeWord} onChange={(e) => setWholeWord(e.target.checked)} />
                                    <span>Whole word</span>
                                </label>
                                <label className="check-row" style={{ flex: '1 1 auto' }}>
                                    <input type="checkbox" checked={useRegex} onChange={(e) => setUseRegex(e.target.checked)} />
                                    <span>Regex</span>
                                </label>
                            </div>
                            <div className="grid grid-cols-2 gap-3">
                                <button onClick={() => doReplace(false)} className="action-btn btn-blue" disabled={!findText || !!error}>
                                    <span className="icon-wrap"><i className="fas fa-arrow-right"></i></span>
                                    <span>Replace Next</span>
                                </button>
                                <button onClick={() => doReplace(true)} className="action-btn btn-emerald" disabled={!findText || !!error}>
                                    <span className="icon-wrap"><i className="fas fa-list-check"></i></span>
                                    <span>Replace All</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ============= Tab Bar =============
        function TabBar({ tabs, activeTab, setActiveTab, onNewTab, onCloseTab, onRenameTab, onPinTab, onDuplicateTab }) {
            const [editingId, setEditingId] = React.useState(null);
            const [editValue, setEditValue] = React.useState('');
            const [contextMenu, setContextMenu] = React.useState(null);
            const inputRef = React.useRef(null);

            React.useEffect(() => {
                if (editingId !== null && inputRef.current) {
                    inputRef.current.focus();
                    inputRef.current.select();
                }
            }, [editingId]);

            React.useEffect(() => {
                if (!contextMenu) return;
                const close = () => setContextMenu(null);
                document.addEventListener('click', close);
                document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
                return () => document.removeEventListener('click', close);
            }, [contextMenu]);

            const startEdit = (tab) => {
                setEditingId(tab.id);
                setEditValue(tab.name);
            };
            const commitEdit = () => {
                if (editingId !== null) {
                    const v = editValue.trim();
                    if (v) onRenameTab(editingId, v);
                    setEditingId(null);
                }
            };

            const handleContextMenu = (e, tab) => {
                e.preventDefault();
                setContextMenu({ x: e.clientX, y: e.clientY, tabId: tab.id });
            };

            const closableCount = tabs.filter(t => !t.pinned).length;

            return (
                <div className="tabbar" role="tablist" aria-label="Open documents">
                    {tabs.map(tab => (
                        <div key={tab.id}
                            className={`tab ${activeTab === tab.id ? 'active' : ''} ${tab.pinned ? 'pinned' : ''}`}
                            role="tab"
                            tabIndex={0}
                            aria-selected={activeTab === tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); setActiveTab(tab.id); } }}
                            onDoubleClick={() => startEdit(tab)}
                            onContextMenu={(e) => handleContextMenu(e, tab)}
                            title={tab.pinned ? `${tab.name} (pinned) — right-click for options` : 'Double-click to rename, right-click for options'}>
                            {tab.pinned
                                ? <i className="fas fa-thumbtack" style={{ fontSize: 9 }}></i>
                                : <i className="fas fa-file-lines" style={{ fontSize: 10, opacity: 0.7 }}></i>}
                            {editingId === tab.id ? (
                                <input
                                    ref={inputRef}
                                    type="text"
                                    value={editValue}
                                    onChange={(e) => setEditValue(e.target.value)}
                                    onBlur={commitEdit}
                                    onKeyDown={(e) => {
                                        if (e.key === 'Enter') commitEdit();
                                        else if (e.key === 'Escape') setEditingId(null);
                                    }}
                                    onClick={(e) => e.stopPropagation()}
                                    style={{
                                        background: 'var(--surface-2)',
                                        border: '1px solid var(--accent)',
                                        borderRadius: 4,
                                        padding: '1px 6px',
                                        fontSize: 12,
                                        color: 'var(--text)',
                                        width: 110,
                                        outline: 'none'
                                    }}
                                />
                            ) : (
                                <span>{tab.name}{tab.dirty ? ' •' : ''}</span>
                            )}
                            {(closableCount > 1 || !tab.pinned) && editingId !== tab.id && !tab.pinned && (
                                <span className="close-x" onClick={(e) => { e.stopPropagation(); onCloseTab(tab.id); }} aria-label={`Close ${tab.name}`} role="button">
                                    <i className="fas fa-times"></i>
                                </span>
                            )}
                        </div>
                    ))}
                    <button onClick={onNewTab} className="icon-btn" style={{ width: 28, height: 28, margin: '0 4px' }} title="New tab (Ctrl+T)" aria-label="New tab">
                        <i className="fas fa-plus" style={{ fontSize: 11 }}></i>
                    </button>
                    {contextMenu && (() => {
                        const tab = tabs.find(t => t.id === contextMenu.tabId);
                        if (!tab) return null;
                        // Constrain menu within viewport
                        const x = Math.min(contextMenu.x, window.innerWidth - 200);
                        const y = Math.min(contextMenu.y, window.innerHeight - 200);
                        return (
                            <div role="menu" onClick={(e) => e.stopPropagation()}
                                style={{
                                    position: 'fixed', left: x, top: y, zIndex: 200,
                                    background: 'var(--surface)', border: '1px solid var(--border)',
                                    borderRadius: 10, boxShadow: 'var(--shadow-lg)', padding: 4, minWidth: 180,
                                    animation: 'pop 0.18s cubic-bezier(0.34, 1.56, 0.64, 1)'
                                }}>
                                {[
                                    { icon: 'fa-pen', label: 'Rename', action: () => startEdit(tab) },
                                    { icon: 'fa-clone', label: 'Duplicate', action: () => onDuplicateTab && onDuplicateTab(tab.id) },
                                    { icon: tab.pinned ? 'fa-thumbtack' : 'fa-thumbtack', iconStyle: tab.pinned ? { transform: 'rotate(45deg)' } : null, label: tab.pinned ? 'Unpin tab' : 'Pin tab', action: () => onPinTab(tab.id) },
                                    { divider: true },
                                    { icon: 'fa-times', label: 'Close', action: () => onCloseTab(tab.id), disabled: tab.pinned, danger: true }
                                ].map((item, i) => item.divider
                                    ? <div key={i} style={{ height: 1, background: 'var(--border)', margin: '4px 0' }}></div>
                                    : <div key={i} role="menuitem" onClick={() => { if (item.disabled) return; item.action(); setContextMenu(null); }}
                                        style={{
                                            display: 'flex', alignItems: 'center', gap: 10, padding: '7px 10px',
                                            borderRadius: 6, fontSize: 12.5, cursor: item.disabled ? 'not-allowed' : 'pointer',
                                            opacity: item.disabled ? 0.5 : 1,
                                            color: item.danger ? '#ef4444' : 'var(--text)'
                                        }}
                                        onMouseEnter={(e) => { if (!item.disabled) e.currentTarget.style.background = 'var(--surface-2)'; }}
                                        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                                        <i className={`fas ${item.icon}`} style={{ width: 14, fontSize: 11, ...(item.iconStyle || {}) }}></i>
                                        <span>{item.label}</span>
                                    </div>
                                )}
                            </div>
                        );
                    })()}
                </div>
            );
        }

        // ============= Quill setup =============
        let quillInstance = null;

        const registerCustomFormats = () => {
            if (typeof Quill === 'undefined') return;
            const Parchment = Quill.import('parchment');

            class CaseFormat extends Parchment.Attributor.Class {
                static create(value) { return value; }
            }
            CaseFormat.blotName = 'case'; CaseFormat.keyName = 'case';
            CaseFormat.scope = Parchment.Scope.INLINE;
            CaseFormat.whitelist = ['case-upper', 'case-lower', 'case-title', 'case-swap', 'case-sentence'];

            class TrimWhitespaceFormat extends Parchment.Attributor.Class { static create() { return true; } }
            TrimWhitespaceFormat.blotName = 'trim-whitespace'; TrimWhitespaceFormat.keyName = 'trim-whitespace'; TrimWhitespaceFormat.scope = Parchment.Scope.INLINE;

            class RemoveExtraSpacesFormat extends Parchment.Attributor.Class { static create() { return true; } }
            RemoveExtraSpacesFormat.blotName = 'remove-extra-spaces'; RemoveExtraSpacesFormat.keyName = 'remove-extra-spaces'; RemoveExtraSpacesFormat.scope = Parchment.Scope.INLINE;

            class ReverseTextFormat extends Parchment.Attributor.Class { static create() { return true; } }
            ReverseTextFormat.blotName = 'reverse-text'; ReverseTextFormat.keyName = 'reverse-text'; ReverseTextFormat.scope = Parchment.Scope.INLINE;

            class HighlightFormat extends Parchment.Attributor.Class {
                static create(value) {
                    if (value === 'highlight' || value === true) return 'highlight';
                    return false;
                }
            }
            HighlightFormat.blotName = 'highlight'; HighlightFormat.keyName = 'highlight';
            HighlightFormat.scope = Parchment.Scope.INLINE; HighlightFormat.whitelist = ['highlight'];

            Quill.register(CaseFormat);
            Quill.register(TrimWhitespaceFormat);
            Quill.register(RemoveExtraSpacesFormat);
            Quill.register(ReverseTextFormat);
            Quill.register(HighlightFormat);
        };

        class TextFormattingModule {
            constructor(quill) {
                this.quill = quill;
                this.toolbar = quill.getModule('toolbar');
                if (this.toolbar) {
                    this.toolbar.addHandler('case-upper', () => this.transformCase('upper'));
                    this.toolbar.addHandler('case-lower', () => this.transformCase('lower'));
                    this.toolbar.addHandler('case-title', () => this.transformCase('title'));
                    this.toolbar.addHandler('case-swap', () => this.transformCase('swap'));
                    this.toolbar.addHandler('case-sentence', () => this.transformCase('sentence'));
                    this.toolbar.addHandler('trim-whitespace', () => this.trimWhitespace());
                    this.toolbar.addHandler('remove-extra-spaces', () => this.removeExtraSpaces());
                    this.toolbar.addHandler('reverse-text', () => this.reverseText());
                    this.toolbar.addHandler('highlight', () => this.toggleHighlight());
                }
            }

            transformCase(caseType) {
                const sel = this.quill.getSelection();
                if (!sel || sel.length === 0) { this.toast('Please select text to transform case', 'warning'); return; }
                const selectedText = this.quill.getText(sel.index, sel.length);
                if (!selectedText.trim()) { this.toast('Selected text is empty', 'warning'); return; }
                let t = '';
                switch (caseType) {
                    case 'upper': t = selectedText.toUpperCase(); break;
                    case 'lower': t = selectedText.toLowerCase(); break;
                    case 'title': t = selectedText.split(' ').map(w => w.length === 0 ? '' : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' '); break;
                    case 'swap': t = selectedText.split('').map(c => c === c.toUpperCase() && c !== c.toLowerCase() ? c.toLowerCase() : (c === c.toLowerCase() && c !== c.toUpperCase() ? c.toUpperCase() : c)).join(''); break;
                    case 'sentence':
                        const parts = selectedText.split(/([.!?]+\s*)/);
                        let r = [];
                        for (let i = 0; i < parts.length; i++) {
                            let s = parts[i];
                            if (s.trim().length > 0 && i % 2 === 0) {
                                let trimmed = s.trim();
                                if (trimmed.length > 0) r.push(trimmed.charAt(0).toUpperCase() + trimmed.slice(1));
                            } else r.push(s);
                        }
                        t = r.join('');
                        break;
                    default: return;
                }
                this.quill.deleteText(sel.index, sel.length);
                this.quill.insertText(sel.index, t);
                this.quill.setSelection(sel.index, t.length);
                const labels = { upper: 'UPPERCASE', lower: 'lowercase', title: 'Title Case', swap: 'sWaPpEd CaSe', sentence: 'Sentence case' };
                this.toast(`Converted to ${labels[caseType]}`, 'success');
            }

            trimWhitespace() {
                const t = this.quill.getText();
                if (!t.trim()) { this.toast('No text to trim', 'warning'); return; }
                this.quill.setText(t.trim());
                this.toast('Whitespace trimmed', 'success');
            }
            removeExtraSpaces() {
                const t = this.quill.getText();
                if (!t.trim()) { this.toast('No text to process', 'warning'); return; }
                this.quill.setText(t.replace(/\s+/g, ' ').trim());
                this.toast('Extra spaces removed', 'success');
            }
            reverseText() {
                const t = this.quill.getText();
                if (!t.trim()) { this.toast('No text to reverse', 'warning'); return; }
                this.quill.setText(t.split('').reverse().join(''));
                this.toast('Text reversed', 'success');
            }
            toggleHighlight() {
                const sel = this.quill.getSelection();
                if (!sel || sel.length === 0) { this.toast('Please select text to highlight', 'warning'); return; }
                const fmt = this.quill.getFormat(sel);
                if (fmt.highlight === 'highlight') {
                    this.quill.format('highlight', false);
                    this.toast('Highlight removed', 'info');
                } else {
                    this.quill.format('highlight', 'highlight');
                    this.toast('Text highlighted', 'success');
                }
            }
            toast(message, type) {
                document.dispatchEvent(new CustomEvent('showToast', { detail: { message, type } }));
            }
        }

        if (typeof Quill !== 'undefined') {
            try {
                registerCustomFormats();
                Quill.register('modules/textFormatting', TextFormattingModule);
            } catch (e) { console.warn('Quill register error', e); }
        }

        // Web Worker utility with proper cleanup and timeout safety
        const runInWorker = (fn, ...args) => {
            return new Promise((resolve, reject) => {
                let settled = false;
                let blobUrl = null;
                let w = null;
                const cleanup = () => {
                    try { if (w) w.terminate(); } catch (e) {}
                    try { if (blobUrl) URL.revokeObjectURL(blobUrl); } catch (e) {}
                };
                try {
                    const code = `self.onmessage = async (e) => { try { const r = (${fn.toString()})(...e.data); postMessage({ success: true, result: r }); } catch (err) { postMessage({ success: false, error: err.message }); } };`;
                    const blob = new Blob([code], { type: 'application/javascript' });
                    blobUrl = URL.createObjectURL(blob);
                    w = new Worker(blobUrl);
                    // 15-second safety timeout to prevent hung workers
                    const timeoutId = setTimeout(() => {
                        if (settled) return;
                        settled = true;
                        cleanup();
                        reject(new Error('Operation timed out (15s) — text may be too large'));
                    }, 15000);
                    w.onmessage = (e) => {
                        if (settled) return;
                        settled = true;
                        clearTimeout(timeoutId);
                        if (e.data.success) resolve(e.data.result);
                        else reject(new Error(e.data.error));
                        cleanup();
                    };
                    w.onerror = (err) => {
                        if (settled) return;
                        settled = true;
                        clearTimeout(timeoutId);
                        reject(new Error(err.message || 'Worker error'));
                        cleanup();
                    };
                    w.postMessage(args);
                } catch (e) {
                    // Fallback: run synchronously if Worker not supported
                    try {
                        cleanup();
                        const r = fn(...args);
                        resolve(r);
                    } catch (err) {
                        reject(err);
                    }
                }
            });
        };

        // ============= Main App =============
        function App() {
            const [darkMode, setDarkMode] = React.useState(() => {
                try {
                    const saved = localStorage.getItem('darkMode');
                    if (saved !== null) return JSON.parse(saved);
                } catch (e) {}

                    if (flesch >= 90) readingLevel = 'Very Easy (5th grade)';
                    else if (flesch >= 80) readingLevel = 'Easy (6th grade)';
                    else if (flesch >= 70) readingLevel = 'Fairly Easy (7th grade)';
                    else if (flesch >= 60) readingLevel = 'Standard (8–9th grade)';
                    else if (flesch >= 50) readingLevel = 'Fairly Difficult (10–12th)';
                    else if (flesch >= 30) readingLevel = 'Difficult (College)';
                    else readingLevel = 'Very Difficult (Graduate)';
                }

                // Character frequency
                const charFreq = {};
                for (const c of currentText) {
                    if (/[a-zA-Z]/.test(c)) {
                        const lc2 = c.toLowerCase();
                        charFreq[lc2] = (charFreq[lc2] || 0) + 1;
                    }
                }
                const charHistogram = Object.entries(charFreq).sort((a, b) => b[1] - a[1]).slice(0, 12);

                // Language hint heuristic (very rough)

                    else if (/[\u0600-\u06ff]/.test(currentText)) lang = 'Arabic';
                    else lang = 'Unknown';

                            const aLines = a.split('\n');
                            const bLines = b.split('\n');
                            // Simple LCS-based line diff
                            const m = aLines.length, nl = bLines.length;
                            const dp = Array.from({ length: m + 1 }, () => new Int32Array(nl + 1));
                            for (let i = m - 1; i >= 0; i--) {

                            while (j < nl) { rows.push({ type: 'add', a: '', b: bLines[j++] }); }

                                                    {otherTab.name}
